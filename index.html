<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HOWZT</title>
  <script>
    // Apply a saved theme override before the first paint, so there is
    // no flash of the wrong theme. If no preference is saved, nothing is
    // set and the prefers-color-scheme media query decides.
    (function () {
      try {
        var saved = localStorage.getItem('howzt-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="field.css" />
  <link rel="stylesheet" href="modal.css" />
  <style>
    /* Critical splash styles live inline in the head so the splash can
       paint on the very first frame, before any external stylesheet has
       loaded. The splash is then hidden by app.js the moment the app is
       ready, on its own, never waiting on fonts, the PDF library or any
       other background work. A short minimum on-screen time keeps it
       from flashing away too fast to read on a quick load. */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2efe4;
      transition: opacity 0.4s ease;
    }
    #splash.splash--hiding {
      opacity: 0;
    }
    #splash.splash--gone {
      display: none;
    }
    #splash img {
      width: min(70vw, 340px);
      height: auto;
      animation: splash-pop 0.5s ease-out;
    }
    @keyframes splash-pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="splash"><img src="logo.png" alt="HOWZT" /></div>
  <script>
    window.__splashStart = Date.now();
    // Absolute fail-safe: if the app module never runs (load error, old
    // cached file, etc.) this still clears the splash after a few
    // seconds so the user is never trapped looking at it.
    setTimeout(function () {
      var s = document.getElementById('splash');
      if (s && !s.classList.contains('splash--hiding')) {
        s.classList.add('splash--hiding');
        setTimeout(function () { s.classList.add('splash--gone'); }, 450);
      }
    }, 4000);
  </script>

  <div class="app-brand">
    <img src="logo.png" alt="HOWZT" class="app-brand-logo" />
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch light or dark mode">Dark</button>
  </div>

  <div id="setup-container" class="setup-container">
    <div id="setup-target"></div>
  </div>

  <div id="scoring-screen" class="scoring-screen" style="display: none;">
    <header class="status-bar">
      <div class="status-batter">
        <span id="striker-name" class="status-batter-name"></span>
        <span id="non-striker-name" class="status-batter-name status-batter-name--secondary"></span>
      </div>
      <div class="status-centre">
        <div id="live-score" class="status-score"></div>
        <div id="over-ball" class="status-over"></div>
      </div>
      <div class="status-actions">
        <button type="button" id="edit-button" class="status-action-button">Edit last</button>
        <button type="button" id="undo-button" class="status-action-button status-action-button--warning">Undo</button>
      </div>
    </header>

    <div class="bowler-bar">
      <span>Bowling: <strong id="bowler-name"></strong></span>
      <button type="button" id="change-bowler-button" class="bowler-change-button">Bowler</button>
    </div>

    <div class="roster-bar">
      <button type="button" id="add-batter-button" class="roster-bar-button">Add batter</button>
      <button type="button" id="rotate-button" class="roster-bar-button" aria-label="Rotate field orientation">Rotate view</button>
      <button type="button" id="return-to-start-button" class="roster-bar-button roster-bar-button--danger">Return to start</button>
    </div>

    <main id="field-container" class="field-container" aria-label="Cricket field">
      <button type="button" id="keeper-dot-button" class="keeper-dot-button">Dot ball (keeper)</button>
    </main>

    <div class="action-bar">
      <button type="button" id="wicket-button" class="action-bar-button action-bar-button--wicket">Wicket</button>
      <button type="button" id="extra-button" class="action-bar-button">Extra</button>
      <button type="button" id="declare-button" class="action-bar-button">Declare</button>
    </div>
  </div>

  <div id="app-version" class="app-version"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
