<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cricket Analyst</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="field.css" />
  <link rel="stylesheet" href="modal.css" />
</head>
<body>
  <div id="setup-container" class="setup-container"></div>

  <div id="scoring-screen" class="scoring-screen" style="display: none;">
    <header class="status-bar">
      <div class="status-batter">
        <span id="striker-name" class="status-batter-name"></span>
        <span id="non-striker-name" class="status-batter-name status-batter-name--secondary"></span>
      </div>
      <div class="status-centre">
        <div id="live-score" class="status-score"></div>
        <div id="over-ball" class="status-over"></div>
      </div>
      <div class="status-actions">
        <button type="button" id="edit-button" class="status-action-button">Edit last</button>
        <button type="button" id="undo-button" class="status-action-button status-action-button--warning">Undo</button>
      </div>
    </header>

    <div class="bowler-bar">
      <span>Bowling: <strong id="bowler-name"></strong></span>
      <button type="button" id="change-bowler-button" class="bowler-change-button">Change</button>
    </div>

    <div class="roster-bar">
      <button type="button" id="add-batter-button" class="roster-bar-button">Add batter</button>
      <button type="button" id="add-bowler-button" class="roster-bar-button">Add bowler</button>
      <button type="button" id="rotate-button" class="roster-bar-button" aria-label="Rotate field orientation">Rotate view</button>
    </div>

    <main id="field-container" class="field-container" aria-label="Cricket field"></main>

    <div class="action-bar">
      <button type="button" id="wicket-button" class="action-bar-button action-bar-button--wicket">Wicket</button>
      <button type="button" id="extra-button" class="action-bar-button">Extra</button>
      <button type="button" id="declare-button" class="action-bar-button">Declare</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
