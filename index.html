<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cricket Analyst</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <div class="app">

    <header class="header">
      <h1>Cricket Analyst</h1>
      <p>Performance scoring & wagon wheel system</p>
    </header>

    <main>

      <section id="homeScreen" class="screen active">

        <button class="primary" onclick="showNewInnings()">
          New Innings
        </button>

        <button class="secondary" onclick="loadInnings()">
          Resume Innings
        </button>

        <div id="status" class="status"></div>

      </section>

      <section id="inningsScreen" class="screen">

        <h2>New Innings</h2>

        <input id="teamName" placeholder="Batting team name">
        <input id="opposition" placeholder="Opposition">

        <textarea id="battingOrder" placeholder="Enter batting order (one per line)"></textarea>

        <button class="primary" onclick="saveInnings()">
          Save Innings
        </button>

        <button class="secondary" onclick="goHome()">
          Back
        </button>

      </section>

    </main>

  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
  <script src="service-worker.js"></script>

</body>
</html>
